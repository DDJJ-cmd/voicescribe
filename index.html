<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>VoiceScribe AI</title>
  <style>
    :root{
      --bg:#0d1016;
      --panel:#151a22;
      --panel2:#1c2230;
      --line:#2d3647;
      --text:#f3f6fb;
      --muted:#97a3b8;
      --gold:#c9a96e;
      --blue:#6aa8ff;
      --green:#34d399;
      --red:#ef7275;
      --purple:#aa8dff;
      --shadow:0 10px 28px rgba(0,0,0,.22);
      --radius:18px;
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    }
    body{ min-height:100dvh; }

    .app{
      max-width:1280px;
      margin:0 auto;
      padding:12px;
    }

    .shell{
      display:grid;
      grid-template-columns:320px 1fr;
      gap:12px;
      min-height:calc(100dvh - 24px);
    }

    .panel,.box{
      background:rgba(21,26,34,.96);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .panel{
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .main{
      display:grid;
      grid-template-rows:auto auto 1fr;
      gap:12px;
      min-height:0;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:16px 18px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .brandDot{
      width:12px;
      height:12px;
      border-radius:999px;
      background:#5a6678;
      flex:0 0 auto;
    }

    .brandDot.on{
      background:var(--green);
      box-shadow:0 0 14px rgba(52,211,153,.85);
    }

    .brandText h1{
      margin:0;
      font-size:20px;
      letter-spacing:.03em;
    }

    .brandText p{
      margin:4px 0 0;
      color:var(--muted);
      font-size:12px;
    }

    .topActions{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:var(--panel2);
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }

    .gearBtn,button{
      border:1px solid var(--line);
      background:var(--panel2);
      color:var(--text);
      border-radius:14px;
      cursor:pointer;
      transition:.18s ease;
    }

    .gearBtn{
      width:44px;
      height:44px;
      font-size:18px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    button:hover,.gearBtn:hover{
      border-color:var(--gold);
      transform:translateY(-1px);
    }

    .sectionTitle{
      margin:0;
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--gold);
    }

    .controls{
      display:grid;
      gap:10px;
    }

    .primary{ background:linear-gradient(180deg,#27415f,#1f3147); }
    .danger{ background:linear-gradient(180deg,#5a2527,#421b1c); }
    .accent{ background:linear-gradient(180deg,#47376d,#35284e); }
    .ghost{ background:linear-gradient(180deg,#242b38,#1c2230); }

    .mainBtn{
      width:100%;
      padding:15px 14px;
      font-size:15px;
      font-weight:700;
      letter-spacing:.02em;
    }

    .subBtns{
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
    }

    .subBtn{
      width:100%;
      padding:12px 14px;
      font-size:14px;
    }

    .micRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:2px;
    }

    .mini{
      color:var(--muted);
      font-size:12px;
      line-height:1.6;
    }

    .wave{
      display:flex;
      gap:3px;
      align-items:flex-end;
      height:22px;
    }

    .bar{
      width:4px;
      height:6px;
      border-radius:999px;
      background:var(--gold);
      opacity:.35;
    }

    .wave.on .bar{
      animation:wave .9s ease-in-out infinite;
      opacity:1;
    }

    .wave .bar:nth-child(1){animation-delay:0s}
    .wave .bar:nth-child(2){animation-delay:.1s}
    .wave .bar:nth-child(3){animation-delay:.2s}
    .wave .bar:nth-child(4){animation-delay:.1s}
    .wave .bar:nth-child(5){animation-delay:0s}

    .dashboard{ padding:16px; }

    .stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
    }

    .stat{
      background:var(--panel2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      min-height:92px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .stat .value{
      font-size:22px;
      font-weight:800;
      line-height:1.2;
      word-break:break-word;
    }

    .stat .label{
      margin-top:5px;
      font-size:11px;
      color:var(--muted);
    }

    .live{ padding:16px; }

    .liveGrid{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      margin-top:10px;
    }

    .liveCard{
      background:#0b0e14;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      min-height:120px;
      display:flex;
      flex-direction:column;
    }

    .liveCard strong{
      display:block;
      margin-bottom:8px;
      color:var(--gold);
      font-size:12px;
      letter-spacing:.04em;
    }

    .liveText{
      white-space:pre-wrap;
      line-height:1.7;
      color:#c8d1df;
      font-size:14px;
      flex:1;
    }

    .liveText.translate{
      color:#bcd7ff;
    }

    .transcript{
      padding:16px;
      min-height:0;
      display:flex;
      flex-direction:column;
    }

    .transcriptTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .toolbar{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .toolbar button{
      width:auto;
      padding:10px 13px;
      font-size:13px;
    }

    .log{
      flex:1;
      min-height:320px;
      background:#0b0e14;
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      overflow:auto;
    }

    .placeholder{
      padding:56px 20px;
      text-align:center;
      color:var(--muted);
    }

    .entry{
      padding:12px 0;
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .entry:last-child{ border-bottom:0; }

    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:6px;
      font-size:11px;
      color:var(--gold);
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid var(--line);
      color:var(--muted);
    }

    .lng-en{
      color:#bcd7ff;
      border-color:rgba(106,168,255,.32);
    }

    .lng-ja{
      color:#ffe1ad;
      border-color:rgba(201,169,110,.34);
    }

    .orig{
      white-space:pre-wrap;
      line-height:1.75;
      font-size:15px;
    }

    .tran{
      margin-top:7px;
      padding:10px 12px;
      border-left:3px solid var(--blue);
      background:rgba(106,168,255,.08);
      border-radius:0 10px 10px 0;
      color:#bcd7ff;
      white-space:pre-wrap;
      line-height:1.7;
    }

    .toast{
      position:fixed;
      left:16px;
      right:16px;
      bottom:16px;
      background:rgba(239,114,117,.14);
      border:1px solid var(--red);
      color:#ffc0c1;
      border-radius:14px;
      padding:12px 14px;
      display:none;
      z-index:50;
      backdrop-filter:blur(8px);
    }

    .toast.show{ display:block; }

    @keyframes wave{
      0%,100%{height:6px}
      50%{height:20px}
    }

    @media (max-width:1040px){
      .shell{ grid-template-columns:1fr; }
    }

    @media (max-width:780px){
      .liveGrid{ grid-template-columns:1fr; }
      .stats{ grid-template-columns:1fr; }
      .topbar{ padding:14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <aside class="panel">
        <h2 class="sectionTitle">Controls</h2>

        <div class="controls">
          <button id="startBtn" class="mainBtn primary">◎ Rec</button>
          <button id="stopBtn" class="mainBtn danger" disabled>Stop Recording</button>
          <button id="askChatGPTBtn" class="mainBtn accent">ChatGPTに議事録を依頼</button>
        </div>

        <div class="subBtns">
          <button id="copyBtn" class="subBtn ghost">全文コピー</button>
          <button id="saveAudioBtn" class="subBtn ghost">録音保存</button>
          <button id="clearBtn" class="subBtn ghost">クリア</button>
        </div>

        <div class="micRow">
          <div class="wave" id="wave">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </div>
          <div class="mini" id="micHint">マイク許可後に開始</div>
        </div>

        <div class="mini">
          設定は右上の⚙️から変更できます。
        </div>
      </aside>

      <main class="main">
        <section class="box topbar">
          <div class="brand">
            <div class="brandDot" id="statusDot"></div>
            <div class="brandText">
              <h1>VoiceScribe AI</h1>
              <p id="statusText">STANDBY</p>
            </div>
          </div>

          <div class="topActions">
            <div class="chip" id="clock">--:--:--</div>
            <div class="chip">EN Meeting Focus</div>
            <a class="gearBtn" href="./settings.html" aria-label="設定">⚙️</a>
          </div>
        </section>

        <section class="box dashboard">
          <h2 class="sectionTitle">Meeting Dashboard</h2>
          <div class="stats">
            <div class="stat">
              <div class="value" id="dur">0:00</div>
              <div class="label">経過時間</div>
            </div>
            <div class="stat">
              <div class="value" id="langMix">EN 0% / JA 0%</div>
              <div class="label">会議内の言語構成比</div>
            </div>
          </div>
        </section>

        <section class="box live">
          <h2 class="sectionTitle">Live View</h2>
          <div class="liveGrid">
            <div class="liveCard">
              <strong>途中原文</strong>
              <div class="liveText" id="interimOrig">まだありません</div>
            </div>
            <div class="liveCard">
              <strong>途中翻訳</strong>
              <div class="liveText translate" id="interimTran">まだありません</div>
            </div>
            <div class="liveCard">
              <strong>最新確定</strong>
              <div class="liveText" id="latestFinal">まだありません</div>
            </div>
          </div>
        </section>

        <section class="box transcript">
          <div class="transcriptTop">
            <h2 class="sectionTitle" style="margin:0;">Transcript</h2>
            <div class="toolbar">
              <button id="scrollBottomBtn" class="ghost">末尾へ</button>
            </div>
          </div>

          <div class="log" id="log">
            <div class="placeholder" id="placeholder">
              録音開始で、文字起こしと日本語表示が始まります。
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);

    const STORAGE_SESSION_KEY = 'voicescribe_session_v5';
    const STORAGE_SETTINGS_KEY = 'voicescribe_settings_v1';

    const WORKER_BASE_URL = 'https://divine-moon-7052.jsmgoo11185.workers.dev';
    const PAUSE_MS = 700;
    const MIN_INTERIM_LEN = 18;
    const FINAL_MERGE_MS = 2200;

    const DEFAULT_SETTINGS = {
      promptSpeakerDiarization: true,
      promptNameExtraction: true,
      promptPostAiCleanup: true
    };

    let recognition = null;
    let recognitionInstanceId = 0;
    let mediaRecorder = null;
    let mediaStream = null;
    let chunks = [];
    let audioBlob = null;

    let running = false;
    let startedAt = null;
    let timer = null;

    let entries = [];
    let stats = { english:0, japanese:0 };

    let interimTimer = null;
    let latestInterim = '';
    let latestInterimTranslated = '';
    let lastInterimAt = 0;
    let lastInterimRequestedText = '';
    let lastInterimRenderedText = '';
    let interimRequestSeq = 0;
    let latestAcceptedInterimSeq = 0;

    let latestFinalText = '';

    function loadSettings(){
      try{
        const raw = localStorage.getItem(STORAGE_SETTINGS_KEY);
        if(!raw) return { ...DEFAULT_SETTINGS };
        return { ...DEFAULT_SETTINGS, ...JSON.parse(raw) };
      }catch(_){
        return { ...DEFAULT_SETTINGS };
      }
    }

    function toast(msg){
      const el = $('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => {
        el.classList.remove('show');
      }, 3200);
    }

    function updateClock(){
      $('clock').textContent = new Date().toLocaleTimeString('ja-JP',{ hour12:false });
    }
    updateClock();
    setInterval(updateClock,1000);

    function escHtml(str){
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
    }

    function detectLang(text){
      const s = String(text || '').trim();
      if(!s) return 'other';

      const ja = (s.match(/[ぁ-んァ-ン一-龥]/g) || []).length;
      const en = (s.match(/[A-Za-z]/g) || []).length;

      if(ja === 0 && en === 0) return 'other';
      if(ja > en) return 'ja';
      if(en > ja) return 'en';
      return en > 0 ? 'en' : 'ja';
    }

    function updateStats(){
      const total = stats.english + stats.japanese;
      const enRatio = total ? Math.round((stats.english / total) * 100) : 0;
      const jaRatio = total ? Math.round((stats.japanese / total) * 100) : 0;
      $('langMix').textContent = `EN ${enRatio}% / JA ${jaRatio}%`;
    }

    function setUi(isOn){
      running = isOn;
      $('statusDot').classList.toggle('on', isOn);
      $('statusText').textContent = isOn ? 'RECORDING' : 'STANDBY';
      $('wave').classList.toggle('on', isOn);
      $('startBtn').disabled = isOn;
      $('stopBtn').disabled = !isOn;
      $('micHint').textContent = isOn ? '録音中' : 'マイク許可後に開始';
    }

    function tickDuration(){
      if(!startedAt){
        $('dur').textContent = '0:00';
        return;
      }
      const sec = Math.floor((Date.now() - startedAt) / 1000);
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = String(sec % 60).padStart(2,'0');
      $('dur').textContent = h > 0 ? `${h}:${String(m).padStart(2,'0')}:${s}` : `${m}:${s}`;
    }

    function saveSession(){
      try{
        localStorage.setItem(STORAGE_SESSION_KEY, JSON.stringify({
          entries,
          stats,
          latestFinalText
        }));
      }catch(_){}
    }

    function restoreSession(){
      try{
        const raw = localStorage.getItem(STORAGE_SESSION_KEY);
        if(!raw) return;

        const parsed = JSON.parse(raw);
        entries = Array.isArray(parsed.entries) ? parsed.entries : [];
        stats = parsed.stats || { english:0, japanese:0 };
        latestFinalText = parsed.latestFinalText || '';

        $('latestFinal').textContent = latestFinalText || 'まだありません';

        renderEntries();
        updateStats();
      }catch(_){}
    }

    function renderEntries(){
      const log = $('log');

      if(!entries.length){
        log.innerHTML = '<div class="placeholder" id="placeholder">録音開始で、文字起こしと日本語表示が始まります。</div>';
        return;
      }

      log.innerHTML = '';

      for(const item of entries){
        const wrap = document.createElement('div');
        wrap.className = 'entry';
        wrap.innerHTML = `
          <div class="meta">
            <span>${escHtml(item.time)}</span>
            <span class="pill ${item.langTag === 'ja' ? 'lng-ja' : 'lng-en'}">${item.langTag === 'ja' ? '日本語' : 'English / Other'}</span>
          </div>
          <div class="orig">${escHtml(item.original || '')}</div>
          ${item.translation ? `<div class="tran">${escHtml(item.translation)}</div>` : ''}
        `;
        log.appendChild(wrap);
      }

      log.scrollTop = log.scrollHeight;
    }

    function scrollTranscriptBottom(){
      $('log').scrollTop = $('log').scrollHeight;
    }

    function normalizeJapaneseText(text){
      return String(text || '')
        .replace(/\s+/g,'')
        .trim();
    }

    function shouldMergeWithPreviousEntry(prev, clean, langTag){
      if(!prev) return false;
      if(prev.langTag !== langTag) return false;
      if(!prev._ts) return false;

      const within = (Date.now() - prev._ts) <= FINAL_MERGE_MS;
      if(!within) return false;

      const prevText = String(prev.original || '').trim();
      if(/[.!?。！？:]$/.test(prevText)) return false;

      return true;
    }

    async function translateWithDeepL(text){
      try{
        const clean = String(text || '').trim();
        if(!clean) return null;

        const lang = detectLang(clean);

        if(lang === 'ja'){
          return clean;
        }

        const endpoint = `${WORKER_BASE_URL}/translate?text=${encodeURIComponent(clean)}&source=EN&target=JA`;
        const res = await fetch(endpoint, { method:'GET' });

        if(!res.ok){
          throw new Error(`Worker error: ${res.status}`);
        }

        const data = await res.json();
        return data?.translations?.[0]?.text || null;
      }catch(e){
        console.error(e);
        toast('翻訳エラー');
        return null;
      }
    }

    async function addFinalEntry(text){
      const raw = String(text || '').trim();
      if(!raw) return;

      $('placeholder')?.remove();

      const langTag = detectLang(raw);
      let clean = raw;

      if(langTag === 'ja'){
        clean = normalizeJapaneseText(raw);
        stats.japanese += 1;
      }else if(langTag === 'en'){
        stats.english += 1;
      }

      const prev = entries.length ? entries[entries.length - 1] : null;
      let item;

      if(shouldMergeWithPreviousEntry(prev, clean, langTag)){
        prev.original = langTag === 'ja'
          ? `${prev.original}${clean}`.trim()
          : `${prev.original} ${clean}`.replace(/\s+/g,' ').trim();
        prev._ts = Date.now();
        item = prev;
      }else{
        item = {
          time: new Date().toLocaleTimeString('ja-JP', { hour12:false }),
          original: clean,
          translation: null,
          langTag,
          _ts: Date.now()
        };
        entries.push(item);
      }

      latestFinalText = item.original;
      $('latestFinal').textContent = latestFinalText;

      renderEntries();
      updateStats();

      if(langTag === 'ja'){
        item.translation = null;
      }else{
        const translated = await translateWithDeepL(item.original);
        if(translated){
          item.translation = translated;
          latestFinalText = translated;
          $('latestFinal').textContent = translated;
        }
      }

      renderEntries();
      saveSession();
    }

    function scheduleInterimTranslation(){
      clearTimeout(interimTimer);

      const scheduledText = latestInterim;
      const mySeq = ++interimRequestSeq;

      interimTimer = setTimeout(async () => {
        const silence = Date.now() - lastInterimAt;

        if(silence < PAUSE_MS){
          scheduleInterimTranslation();
          return;
        }

        const clean = String(latestInterim || '').trim();
        if(!clean){
          $('interimTran').textContent = 'まだありません';
          return;
        }

        if(clean.length < MIN_INTERIM_LEN){
          return;
        }

        if(clean !== scheduledText){
          scheduleInterimTranslation();
          return;
        }

        if(clean === lastInterimRequestedText || clean === lastInterimRenderedText){
          return;
        }

        const lang = detectLang(clean);

        if(lang === 'ja'){
          const normalized = normalizeJapaneseText(clean);
          latestInterimTranslated = normalized;
          lastInterimRenderedText = clean;
          $('interimTran').textContent = normalized || 'まだありません';
          return;
        }

        lastInterimRequestedText = clean;
        $('interimTran').textContent = '翻訳中…';

        const translated = await translateWithDeepL(clean);

        if(mySeq < latestAcceptedInterimSeq) return;
        if(clean !== latestInterim) return;

        latestAcceptedInterimSeq = mySeq;
        latestInterimTranslated = translated || '翻訳なし';
        lastInterimRenderedText = clean;
        $('interimTran').textContent = latestInterimTranslated;
      }, PAUSE_MS);
    }

    function buildRecognition(){
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if(!SR) return null;

      const r = new SR();
      const myId = ++recognitionInstanceId;

      r.lang = 'en-US';
      r.continuous = true;
      r.interimResults = true;
      r.maxAlternatives = 1;

      r.onresult = async (event) => {
        if(myId !== recognitionInstanceId) return;

        let interimText = '';
        let hadFinal = false;

        for(let i = event.resultIndex; i < event.results.length; i++){
          const result = event.results[i];
          const text = result[0]?.transcript?.trim();
          if(!text) continue;

          if(result.isFinal){
            hadFinal = true;

            clearTimeout(interimTimer);
            interimTimer = null;

            interimRequestSeq += 1;
            latestInterim = '';
            latestInterimTranslated = '';
            lastInterimRequestedText = '';
            lastInterimRenderedText = '';

            const lang = detectLang(text);
            $('interimOrig').textContent = lang === 'ja' ? normalizeJapaneseText(text) : text;
            $('interimTran').textContent = lang === 'ja' ? normalizeJapaneseText(text) : '正式翻訳中…';

            await addFinalEntry(text);

            $('interimOrig').textContent = 'まだありません';
            $('interimTran').textContent = 'まだありません';
          }else{
            interimText += text + ' ';
          }
        }

        if(!hadFinal && interimText){
          latestInterim = interimText.trim();

          const lang = detectLang(latestInterim);
          $('interimOrig').textContent = lang === 'ja'
            ? normalizeJapaneseText(latestInterim)
            : latestInterim;

          lastInterimAt = Date.now();

          if(latestInterim.length >= MIN_INTERIM_LEN){
            scheduleInterimTranslation();
          }
        }
      };

      r.onerror = (e) => {
        if(myId !== recognitionInstanceId) return;

        if(e.error === 'not-allowed'){
          toast('マイク権限が拒否されました。');
        }else if(e.error === 'audio-capture'){
          toast('音声入力が見つかりません。');
        }else if(e.error !== 'no-speech' && e.error !== 'aborted'){
          toast('音声認識エラー: ' + e.error);
        }
      };

      r.onend = () => {
        if(myId !== recognitionInstanceId) return;
        if(!running) return;

        try{
          recognition = buildRecognition();
          if(recognition) recognition.start();
        }catch(_){}
      };

      return r;
    }

    function getTranscriptText(){
      return entries.map(e => {
        const tr = e.translation ? `\n日本語: ${e.translation}` : '';
        return `[${e.time}]\n原文: ${e.original}${tr}`;
      }).join('\n\n');
    }

    function buildMinutesPrompt(){
      const settings = loadSettings();
      const transcript = getTranscriptText();

      const extra = [];

      if(settings.promptSpeakerDiarization){
        extra.push('可能であれば話者ごとに発言を整理してください。ただし、推定に自信がない箇所は「話者要確認」と明記してください。');
      }
      if(settings.promptNameExtraction){
        extra.push('発話内の自己紹介、呼称、人名、役職名、組織名をできる範囲で抽出し、議事録に反映してください。不確かな場合は「要確認」としてください。');
      }
      if(settings.promptPostAiCleanup){
        extra.push('最後に、議事録として読みやすい日本語に整え、重複・言い淀み・断片表現を整理してください。');
      }

      return `この文字起こしから議事録を作成して欲しい。

やってほしいこと:
1. 自然な日本語で議事録を作成
2. 「会議概要」「決定事項」「保留事項」「To Do」「主な論点」「数値・固有名詞」に分ける
3. 英語発言は自然な日本語に整える
4. 推測は「要確認」と明記する
5. 次回までの確認事項を3〜5個書く
${extra.map((x, i) => `${6 + i}. ${x}`).join('\n')}

補足:
- ブラウザ音声認識由来の誤変換があり得ます
- 明確でない情報は断定せず「要確認」としてください

--- 文字起こし開始 ---
${transcript || '（文字起こしなし）'}
--- 文字起こし終了 ---`;
    }

    async function askChatGPTForMinutes(){
      if(!entries.length){
        toast('まず録音してください。');
        return;
      }

      const prompt = buildMinutesPrompt();

      try{
        await navigator.clipboard.writeText(prompt);
      }catch(_){
        toast('コピーに失敗しました。');
      }

      const fallbackWeb = () => {
        window.open('https://chatgpt.com/', '_blank', 'noopener,noreferrer');
      };

      try{
        const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);

        if(isMobile){
          window.location.href = 'chatgpt://';
          setTimeout(() => {
            if (document.visibilityState === 'visible') {
              fallbackWeb();
            }
          }, 1200);
        }else{
          fallbackWeb();
        }

        toast('プロンプトをコピーしました。ChatGPTアプリを開きます。貼り付け後、送信してください。');
      }catch(_){
        fallbackWeb();
        toast('プロンプトをコピーしました。ChatGPTを開いて貼り付けてください。');
      }
    }

    async function copyAll(){
      const text = getTranscriptText();
      if(!text){
        toast('コピーする内容がありません。');
        return;
      }
      try{
        await navigator.clipboard.writeText(text);
        toast('全文をコピーしました。');
      }catch(_){
        toast('コピーに失敗しました。');
      }
    }

    function downloadBlob(blob, fileName){
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    }

    function makeBaseName(){
      const d = new Date();
      const stamp = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
      return `voicescribe_${stamp}`;
    }

    function saveAudio(){
      if(!audioBlob){
        toast('録音データがありません。停止後に保存できます。');
        return;
      }
      const ext = audioBlob.type.includes('mp4') ? 'm4a' : 'webm';
      downloadBlob(audioBlob, `${makeBaseName()}.${ext}`);
    }

    async function startRecording(){
      try{
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio:true });
      }catch(_){
        toast('マイクに接続できません。HTTPSで開き、マイク許可を確認してください。');
        return;
      }

      try{
        const mimeType = window.MediaRecorder && MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
          ? 'audio/webm;codecs=opus'
          : (window.MediaRecorder && MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '');

        mediaRecorder = new MediaRecorder(mediaStream, mimeType ? { mimeType } : undefined);

        chunks = [];
        audioBlob = null;
        latestInterim = '';
        latestInterimTranslated = '';
        lastInterimRequestedText = '';
        lastInterimRenderedText = '';
        interimRequestSeq = 0;
        latestAcceptedInterimSeq = 0;

        mediaRecorder.ondataavailable = (e) => {
          if(e.data && e.data.size > 0) chunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
          audioBlob = new Blob(chunks, { type: chunks[0]?.type || 'audio/webm' });
          if(audioBlob && audioBlob.size > 0){
            saveAudio();
          }
        };

        mediaRecorder.start(1000);
      }catch(_){
        toast('録音開始に失敗しました。');
        return;
      }

      recognition = buildRecognition();
      if(!recognition){
        toast('このブラウザはWeb Speech APIに未対応です。PC Chrome または iPhone Safari を試してください。');
      }else{
        try{
          recognition.start();
        }catch(_){
          toast('音声認識の開始に失敗しました。');
        }
      }

      startedAt = Date.now();
      clearInterval(timer);
      timer = setInterval(() => { tickDuration(); }, 1000);

      tickDuration();
      setUi(true);
    }

    function stopRecording(){
      setUi(false);

      clearInterval(timer);
      timer = null;

      clearTimeout(interimTimer);
      interimTimer = null;

      recognitionInstanceId += 1;

      if(recognition){
        try{
          recognition.onend = null;
          recognition.stop();
        }catch(_){}
      }
      recognition = null;

      if(mediaRecorder && mediaRecorder.state !== 'inactive'){
        try{
          mediaRecorder.stop();
        }catch(_){}
      }

      if(mediaStream){
        mediaStream.getTracks().forEach(t => t.stop());
      }
      mediaStream = null;

      latestInterim = '';
      latestInterimTranslated = '';
      $('interimOrig').textContent = 'まだありません';
      $('interimTran').textContent = 'まだありません';

      saveSession();
    }

    function clearAll(){
      if(running){
        stopRecording();
      }

      entries = [];
      stats = { english:0, japanese:0 };
      latestFinalText = '';
      audioBlob = null;
      chunks = [];
      startedAt = null;

      $('dur').textContent = '0:00';
      $('interimOrig').textContent = 'まだありません';
      $('interimTran').textContent = 'まだありません';
      $('latestFinal').textContent = 'まだありません';
      $('log').innerHTML = '<div class="placeholder" id="placeholder">録音開始で、文字起こしと日本語表示が始まります。</div>';

      localStorage.removeItem(STORAGE_SESSION_KEY);
      updateStats();
      toast('クリアしました。');
    }

    $('startBtn').addEventListener('click', startRecording);
    $('stopBtn').addEventListener('click', stopRecording);
    $('askChatGPTBtn').addEventListener('click', askChatGPTForMinutes);
    $('copyBtn').addEventListener('click', copyAll);
    $('saveAudioBtn').addEventListener('click', saveAudio);
    $('clearBtn').addEventListener('click', clearAll);
    $('scrollBottomBtn').addEventListener('click', scrollTranscriptBottom);

    window.addEventListener('beforeunload', () => {
      saveSession();
      try{
        if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
      }catch(_){}
      try{
        if(mediaStream) mediaStream.getTracks().forEach(t => t.stop());
      }catch(_){}
      try{
        if(recognition) recognition.stop();
      }catch(_){}
    });

    restoreSession();
    updateStats();
  </script>
</body>
</html>
